<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verso — Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #FAF8F2;
      --surface:  #F4F1E9;
      --ink:      #1A1815;
      --muted:    #8B8474;
      --outline:  #D6CFBE;
      --accent:   #A8551E;
      --accentbg: #F0E0CE;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .wordmark {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      margin-bottom: 20px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #0A0A0A;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { width: 24px; height: 24px; }

    .brand-name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--ink);
    }

    .tagline {
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .rule {
      width: 100%;
      max-width: 480px;
      border: none;
      border-top: 1px solid var(--outline);
      margin: 24px auto;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 480px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--outline);
      border-radius: 0;
      padding: 24px 28px;
      text-decoration: none;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s;
    }

    .card:hover { background: var(--accentbg); }

    .card-inner h2 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card-inner p {
      font-size: 13px;
      color: var(--muted);
    }

    .card-arrow {
      font-size: 20px;
      color: var(--accent);
      flex-shrink: 0;
      margin-left: 16px;
    }

    footer {
      margin-top: 48px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <div class="wordmark">
      <div class="logo">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M14,22 L30,22 L50,50 L70,22 L86,22 L50,80 Z" fill="#F5F1E8"/>
        </svg>
      </div>
      <span class="brand-name">Verso</span>
    </div>
    <p class="tagline">Legal Documents</p>
    <hr class="rule" />
  </header>

  <div class="cards">
    <a class="card" href="privacy-policy.html">
      <div class="card-inner">
        <h2>Privacy Policy</h2>
        <p>How we collect, use, and protect your data</p>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="terms-of-use.html">
      <div class="card-inner">
        <h2>Terms of Use</h2>
        <p>Rules and conditions for using Verso</p>
      </div>
      <span class="card-arrow">→</span>
    </a>
  </div>

  <footer>
    <p>© 2025 AdyLabs. Questions? <a href="mailto:adylabs.android@gmail.com">adylabs.android@gmail.com</a></p>
  </footer>

</body>
</html>
